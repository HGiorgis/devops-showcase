<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevOps CI/CD Showcase</title>
    <style>
      :root {
        --primary: #00ff88;
        --bg-color: #0b0f19;
        --card-bg: rgba(255, 255, 255, 0.03);
        --text-main: #ffffff;
        --text-muted: #8b9bb4;
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: var(--bg-color);
        background-image:
          radial-gradient(
            circle at 15% 50%,
            rgba(0, 255, 136, 0.08),
            transparent 25%
          ),
          radial-gradient(
            circle at 85% 30%,
            rgba(0, 150, 255, 0.08),
            transparent 25%
          );
        color: var(--text-main);
        overflow: hidden;
      }

      .showcase-card {
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 3rem 4rem;
        text-align: center;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        animation: float 6s ease-in-out infinite;
        position: relative;
        z-index: 10;
      }

      @keyframes float {
        0% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
        100% {
          transform: translateY(0px);
        }
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(0, 255, 136, 0.1);
        color: var(--primary);
        padding: 8px 16px;
        border-radius: 100px;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 24px;
        border: 1px solid rgba(0, 255, 136, 0.2);
      }

      .pulse {
        width: 8px;
        height: 8px;
        background-color: var(--primary);
        border-radius: 50%;
        box-shadow: 0 0 10px var(--primary);
        animation: pulse-animation 2s infinite;
      }

      @keyframes pulse-animation {
        0% {
          box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(0, 255, 136, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(0, 255, 136, 0);
        }
      }

      h1 {
        font-size: 3.5rem;
        margin: 0 0 16px 0;
        font-weight: 800;
        background: linear-gradient(to right, #ffffff, #a5b4cb);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -1px;
      }

      p {
        font-size: 1.25rem;
        color: var(--text-muted);
        margin: 0;
        line-height: 1.6;
      }

      .version-box {
        margin-top: 32px;
        display: inline-block;
      }

      .version-label {
        font-size: 0.8rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 8px;
      }

      .version-number {
        font-size: 2.5rem;
        font-weight: 700;
        font-family: monospace;
        color: #ffffff;
        background: rgba(255, 255, 255, 0.05);
        padding: 10px 30px;
        border-radius: 12px;
        border: 1px dashed rgba(255, 255, 255, 0.2);
        transition: all 0.3s ease;
      }

      .version-number:hover {
        border-color: var(--primary);
        box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
      }

      .decor {
        position: absolute;
        font-family: monospace;
        color: rgba(255, 255, 255, 0.03);
        font-size: 1.5rem;
        white-space: pre;
        z-index: 1;
        pointer-events: none;
      }

      .decor-1 {
        top: 10%;
        left: 5%;
        transform: rotate(-15deg);
      }
      .decor-2 {
        bottom: 15%;
        right: 5%;
        transform: rotate(10deg);
      }
    </style>
  </head>
  <body>
    <!-- Background Code Decoration -->
    <div class="decor decor-1">
      git commit -m "update feature" git push origin master testing
      dependencies...
    </div>
    <div class="decor decor-2">
      build pipeline passed deploying to cloud... status: 200 OK
    </div>

    <!-- Main Container -->
    <div class="showcase-card">
      <div class="status-badge">
        <div class="pulse"></div>
        Pipeline Active
      </div>

      <!-- The CI Pipeline tests search for this 'DevOps' keyword! -->
      <h1>Hello DevOps!</h1>
      <p>
        This application is continuously integrated<br />and deployed using
        GitHub Actions.
      </p>

      <div class="version-box">
        <div class="version-label">Current Release</div>
        <!-- Change this version number during your demo -->
        <div class="version-number">v2.0.0</div>
      </div>
    </div>
  </body>
</html>
