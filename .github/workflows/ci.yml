name: CI/CD Pipeline

on:
  push:
    branches: ["main", "master"]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  # Suppresses the Node 20 deprecation warning for a cleaner demo output
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: HTML Validation Test
        run: |
          echo "Running automated UI checks..."
          if grep -q "DevOps" index.html; then
            echo "✅ UI Test passed! Content is correct."
          else
            echo "❌ Validation failed! Core keyword not found."
            exit 1
          fi

  deploy-to-production:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: test-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Automatically prompts GitHub to enable Pages for this repo!
          enablement: true
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
