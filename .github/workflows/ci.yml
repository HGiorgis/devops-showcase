name: CI Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Run Tests
        run: python test_app.py
        
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Dummy Deploy Step
        run: echo "Tests passed! Deploying application to the production server..."
